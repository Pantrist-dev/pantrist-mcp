name: CI

# Runs on every push + PR so HEAD always has a green status, regardless of
# whether the push touched paths the deploy workflow cares about (README,
# docs, Dockerfile.glama, etc.). Cheap — just typecheck + unit tests; no
# image build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test
